image: proxyimages.aidefense.security.cisco.com/proxy/aidefensehybrid/artifactory.devhub-cloud.cisco.com/ai-defense-hybrid-docker/proxyrelayclient:latest
imagePullPolicy: Always

replicaCount: 1

config:
  serverAddr: ""
  connectorId: ""
  # Reference a pre-existing Secret containing 'apikey' or 'oidc-token' key
  existingSecret: ""
  # Inline API key (creates a managed Secret; ignored if existingSecret is set)
  apiKey: ""

service:
  type: ClusterIP
  healthzPort: 8080

livenessProbe:
  enabled: true
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

podSecurityContext:
  fsGroup: 65534

containerSecurityContext:
  runAsUser: 65534
  runAsGroup: 65534
  runAsNonRoot: true
  privileged: false
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

nodeSelector: {}
tolerations: []
affinity: {}
