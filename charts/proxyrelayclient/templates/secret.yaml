{{- if and .Values.config.apiKey (not .Values.config.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxyrelayclient.fullname" . }}
  namespace: {{ include "proxyrelayclient.namespace" . }}
  labels:
    {{- include "proxyrelayclient.labels" . | nindent 4 }}
  {{- if (include "proxyrelayclient.annotations" .) }}
  annotations:
{{- include "proxyrelayclient.tplvalues.render" (dict "value" (include "proxyrelayclient.annotations" .) "context" .) | indent 4 }}
  {{- end }}
type: Opaque
data:
  apikey: {{ .Values.config.apiKey | b64enc | quote }}
{{- end }}
