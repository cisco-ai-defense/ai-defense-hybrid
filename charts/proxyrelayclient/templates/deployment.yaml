apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxyrelayclient.fullname" . }}
  namespace: {{ include "proxyrelayclient.namespace" . }}
  labels:
    {{- include "proxyrelayclient.labels" . | nindent 4 }}
  {{- if (include "proxyrelayclient.annotations" .) }}
  annotations:
{{- include "proxyrelayclient.tplvalues.render" (dict "value" (include "proxyrelayclient.annotations" .) "context" .) | indent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "proxyrelayclient.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proxyrelayclient.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
{{- with (include "proxyrelayclient.imagePullSecrets" .) }}
{{ . | nindent 6 }}
{{- end }}
      securityContext: {{ include "proxyrelayclient.renderPodSecurityContext" . | nindent 8 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext: {{ include "proxyrelayclient.renderContainerSecurityContext" . | nindent 12 }}
          image: {{ include "proxyrelayclient.image" . | quote }}
          imagePullPolicy: {{ include "proxyrelayclient.imagePullPolicy" . }}
          ports:
            - name: healthz
              containerPort: {{ .Values.service.healthzPort }}
              protocol: TCP
            - name: debug
              containerPort: 6060
              protocol: TCP
          env:
            - name: PROXY_RELAY_SERVER_ADDR
              value: {{ .Values.config.serverAddr | quote }}
            - name: CONNECTOR_ID
              value: {{ .Values.config.connectorId | quote }}
            - name: HEALTHZ_PORT
              value: {{ .Values.service.healthzPort | quote }}
            {{- if .Values.config.existingSecret }}
            - name: CISCO_AID_APIKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: apikey
                  optional: true
            - name: CISCO_AID_OIDC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: oidc-token
                  optional: true
            {{- else if .Values.config.apiKey }}
            - name: CISCO_AID_APIKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "proxyrelayclient.fullname" . }}
                  key: apikey
            {{- end }}
            {{- with .Values.extraEnvVars }}
{{ toYaml . | indent 12 }}
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
          {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
          {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml .Values.extraVolumeMounts | nindent 12 }}
          {{- end }}
      {{- if .Values.extraVolumes }}
      volumes:
        {{- toYaml .Values.extraVolumes | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 30 }}
