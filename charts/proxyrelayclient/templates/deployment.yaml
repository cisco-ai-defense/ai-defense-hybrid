apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxyrelayclient.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "proxyrelayclient.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "proxyrelayclient.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proxyrelayclient.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: proxyrelayclient
          image: {{ .Values.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: healthz
              containerPort: {{ .Values.service.healthzPort }}
              protocol: TCP
            - name: debug
              containerPort: 6060
              protocol: TCP
          env:
            - name: PROXY_RELAY_SERVER_ADDR
              value: {{ .Values.config.serverAddr | quote }}
            - name: CONNECTOR_ID
              value: {{ .Values.config.connectorId | quote }}
            - name: HEALTHZ_PORT
              value: {{ .Values.service.healthzPort | quote }}
            {{- if .Values.config.existingSecret }}
            - name: CISCO_AID_APIKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: apikey
                  optional: true
            - name: CISCO_AID_OIDC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.config.existingSecret }}
                  key: oidc-token
                  optional: true
            {{- else if .Values.config.apiKey }}
            - name: CISCO_AID_APIKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "proxyrelayclient.fullname" . }}
                  key: apikey
            {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
